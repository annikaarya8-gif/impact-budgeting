<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Impact Budgeting</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=Qwitcher+Grypen:wght@700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
<body>

 
      <!-- Header -->

      <div class="header">
  <img src="coquette.png" alt="cute" class="wrap-img" />

  <div class="header-text">
    <h1>Impact Budgeting</h1>
    <p class="subtitle">Track your time & impact in an aesthetic dashboard </p>
  </div>
</div>

      <!-- Add Entry -->
      <div class="card">
        <h2>Add an Entry</h2>

        <div class="grid">
          <label>
            Category
            <select id="category">
              <option>Volunteering</option>
              <option>Donations</option>
              <option>Studying</option>
              <option>Leadership</option>
              <option>Gym</option>
            </select>
          </label>

          <label>
            Task
            <input
              id="task"
              type="text"
              placeholder="e.g., Soup kitchen, Bake Sale..."
              autocomplete="off"
            />
          </label>

          <label>
            Minutes
            <input
              id="minutes"
              type="number"
              placeholder="45"
              min="1"
            />
          </label>
        </div>

        <div class="actions">
          <button id="addBtn" class="primary" type="button">Add</button>
          <button id="clearBtn" class="danger" type="button">Clear All</button>
        </div>
      </div>

      <!-- Totals -->
      <div class="card">
        <h2>Totals</h2>

        <div class="stats">
          <div class="stat">
            <div class="label">All-time minutes</div>
            <div class="value"><span id="totalMinutes">0</span></div>
          </div>

          <div class="stat">
            <div class="label">This week</div>
            <div class="value"><span id="weeklyMinutes">0</span></div>
          </div>
        </div>
      </div>

      <!-- Graph + Category Totals -->
      <div class="card">
        <h2>Impact Overview</h2>

        <canvas id="categoryChart" width="700" height="300"></canvas>

        <h3 style="margin-top:20px;">Category Totals</h3>
        <ul id="categoryTotals"></ul>
      </div>

      <!-- Calendar -->
      <div class="card">
        <h2>Calendar</h2>

        <div class="actions">
          <button id="prevMonth" type="button">←</button>
          <div id="monthLabel" style="font-weight:800;"></div>
          <button id="nextMonth" type="button">→</button>
        </div>

        <div id="calendar" class="calendar"></div>
      </div>

      <!-- Apple Music -->
      <div class="card">
        <h2>Apple Music </h2>

        <iframe
          allow="autoplay *; encrypted-media *;"
          frameborder="0"
          height="450"
          style="width:100%; border-radius:16px; overflow:hidden; background:transparent;"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
          src="https://embed.music.apple.com/us/playlist/pl.u-leyl1pGCjq0qMyB">
        </iframe>
      </div>

      <!-- History -->
      <div class="card">
        <h2>History</h2>
        <ul id="history"></ul>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
