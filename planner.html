<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planner — Impact Budgeting</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Quick Planner</h2>
        <p class="description">How many minutes do you have today? Here is an impact task for your allotted time ✿</p>

        <label>
          Minutes available today
          <input id="minutesAvailable" type="number" min="1" placeholder="e.g., 30" />
        </label>

        <div class="actions">
          <button id="suggestBtn" class="primary" type="button">Suggest tasks</button>
          <a class="link-btn" href="index.html">← Back to Dashboard</a>
        </div>
      </div>

      <div class="card">
        <h2>Suggestions</h2>
        <ul id="suggestions"></ul>
      </div>
    </div>

    <script src="planner.js"></script>
  </body>
</html>
